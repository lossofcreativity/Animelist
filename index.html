<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Animeflow - Complete Platform | Scrollable Author Descriptions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-gradient-start: #f8f9ff;
            --bg-gradient-end: #eef2f7;
            --text-primary: #1a1e2b;
            --card-bg: #ffffff;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.08);
            --header-bg: rgba(20, 24, 35, 0.98);
            --header-text: #eef2ff;
            --nav-hover: #ff5e7c;
            --border-light: #e2e8f0;
            --empty-bg: #f1f5f9;
            --btn-gradient: linear-gradient(135deg, #ff5e7c 0%, #ff3850 100%);
            --btn-shadow: 0 8px 20px rgba(255, 56, 80, 0.3);
            --modal-overlay: rgba(0,0,0,0.7);
            --hero-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --skeleton-bg: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            --skeleton-card-bg: #e2e8f0;
            --spoiler-bg: #2d2d2d;
        }
        
        body.dark {
            --bg-gradient-start: #0a0c15;
            --bg-gradient-end: #111827;
            --text-primary: #f1f5f9;
            --card-bg: #1e293b;
            --border-light: #334155;
            --empty-bg: #1e293b;
            --hero-bg: linear-gradient(135deg, #1e1b4b 0%, #2d1b4e 100%);
            --skeleton-bg: linear-gradient(110deg, #1e293b 8%, #2d3748 18%, #1e293b 33%);
            --skeleton-card-bg: #0f172a;
            --spoiler-bg: #4a4a4a;
        }
        
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%); color: var(--text-primary); min-height: 100vh; transition: all 0.2s; }
        html { scroll-behavior: smooth; }
        
        .btn-3d, .genre-chip, .theme-toggle, .category-btn, .modal-close, .search-type-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--btn-gradient);
            color: white;
            border: none;
            padding: 10px 24px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--btn-shadow);
            transform: translateY(-2px);
            position: relative;
            overflow: hidden;
        }
        .btn-3d:hover, .genre-chip:hover, .theme-toggle:hover, .category-btn:hover, .modal-close:hover, .search-type-btn:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 12px 28px rgba(255, 56, 80, 0.4); }
        
        .search-type-btn { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-light); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .search-type-btn.active { background: var(--btn-gradient); color: white; border-color: transparent; }
        
        .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.8rem; margin-bottom: 2rem; }
        .skeleton-card { background: var(--skeleton-card-bg); border-radius: 1.5rem; overflow: hidden; }
        .skeleton-img { height: 280px; background: var(--skeleton-bg); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        .skeleton-title { height: 20px; margin: 1rem; width: 80%; background: var(--skeleton-bg); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; border-radius: 8px; }
        .skeleton-text { height: 14px; margin: 0 1rem 1rem 1rem; width: 60%; background: var(--skeleton-bg); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; border-radius: 8px; }
        
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        .theme-toggle { background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); }
        
        header { background: var(--header-bg); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        nav ul { list-style: none; display: flex; justify-content: center; gap: 1.2rem; flex-wrap: wrap; padding: 1rem 2rem; align-items: center; }
        nav ul li a { color: var(--header-text); text-decoration: none; font-weight: 700; padding: 0.5rem 1rem; border-radius: 40px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        nav ul li a:hover, nav ul li a.active { background: var(--nav-hover); color: white; transform: translateY(-2px); }
        
        .nav-search { margin-left: auto; display: flex; gap: 0.5rem; }
        .nav-search-input { padding: 0.5rem 1rem; border-radius: 40px; border: none; background: var(--card-bg); color: var(--text-primary); width: 200px; outline: none; border: 1px solid var(--border-light); }
        .nav-search-btn { background: var(--btn-gradient); border: none; color: white; padding: 0.5rem 1rem; border-radius: 40px; cursor: pointer; }
        
        main { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; min-height: calc(100vh - 200px); }
        
        .hero { background: var(--hero-bg); border-radius: 2rem; padding: 3rem 2rem; margin-bottom: 2rem; text-align: center; color: white; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3); }
        .hero h1 { font-size: 3rem; font-weight: 900; letter-spacing: -1px; }
        
        .section-title { font-size: 1.8rem; font-weight: 800; margin: 2rem 0 1.5rem; border-left: 6px solid #ff5e7c; padding-left: 1rem; display: flex; align-items: center; gap: 10px; }
        
        .categories-scroll { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem; margin-bottom: 2rem; scrollbar-width: thin; }
        .category-btn { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-light); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .category-btn.active { background: var(--btn-gradient); color: white; border-color: transparent; }
        
        .anime-grid { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)) !important; gap: 1.8rem !important; margin-bottom: 2rem; }
        
        .anime-card { background: var(--card-bg); border-radius: 1.5rem; overflow: hidden; transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); cursor: pointer; box-shadow: var(--card-shadow); border: 1px solid var(--border-light); position: relative; }
        .anime-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 30px -10px rgba(0,0,0,0.2); }
        .card-img { aspect-ratio: 3/4; overflow: hidden; position: relative; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .anime-card:hover .card-img img { transform: scale(1.08); }
        .card-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); color: gold; padding: 4px 10px; border-radius: 40px; font-size: 0.8rem; font-weight: bold; }
        .card-content { padding: 1rem; }
        .card-title { font-weight: 800; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }
        .card-info { display: flex; justify-content: space-between; font-size: 0.75rem; color: #5b677b; margin-bottom: 12px; }
        .fav-btn-card { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.6); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(4px); transition: 0.2s; color: white; font-size: 1.2rem; z-index: 2; }
        .fav-btn-card.fav-active { color: #ff4d6d; background: rgba(0,0,0,0.8); }
        .fav-btn-card:hover { transform: scale(1.1); }
        
        .empty-state { text-align: center; padding: 3rem; background: var(--empty-bg); border-radius: 2rem; }
        footer { background: var(--header-bg); color: var(--header-text); text-align: center; padding: 1.5rem; margin-top: 3rem; border-top: 1px solid rgba(255,255,255,0.1); }
        
        .detail-page { background: var(--card-bg); border-radius: 2rem; padding: 2rem; margin-bottom: 2rem; }
        .detail-header { display: flex; gap: 2rem; flex-wrap: wrap; }
        .detail-cover { flex: 0 0 250px; }
        .detail-cover img { width: 100%; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .detail-info { flex: 1; }
        .detail-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; font-style: italic; }
        .detail-meta { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
        .detail-meta span { background: var(--empty-bg); padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.9rem; }
        
        .clickable-chip { background: var(--empty-bg); padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; display: inline-block; margin: 0.2rem; }
        .clickable-chip:hover { background: #ff5e7c; color: white; transform: translateY(-2px); }
        
        .about-section { background: var(--empty-bg); border-radius: 1rem; padding: 1.5rem; margin: 1rem 0; }
        .about-content { line-height: 1.7; max-height: 200px; overflow: hidden; transition: max-height 0.4s ease; }
        .about-content.expanded { max-height: 5000px; }
        .about-content a { color: #ff5e7c; text-decoration: none; }
        .about-content a:hover { text-decoration: underline; }
        
        /* SCROLLABLE AUTHOR DESCRIPTION */
        .author-description-box { 
            background: rgba(255,255,255,0.1); 
            border-radius: 1rem; 
            padding: 1.5rem; 
            margin: 1rem 0;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
            line-height: 1.7;
        }
        .author-description-box::-webkit-scrollbar { width: 8px; }
        .author-description-box::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .author-description-box::-webkit-scrollbar-thumb { background: #ff5e7c; border-radius: 4px; }
        
        .spoiler { background: var(--spoiler-bg); color: var(--spoiler-bg); cursor: pointer; padding: 0.1rem 0.3rem; border-radius: 4px; transition: all 0.2s; }
        .spoiler.revealed { background: var(--empty-bg); color: var(--text-primary); }
        
        .characters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; margin-top: 1rem; max-height: 600px; overflow: hidden; transition: max-height 0.4s ease; }
        .characters-grid.expanded { max-height: none; }
        .character-card { text-align: center; cursor: pointer; padding: 0.5rem; border-radius: 1rem; transition: all 0.2s; }
        .character-card:hover { background: var(--empty-bg); transform: translateY(-5px); }
        .character-card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 0.5rem; }
        .character-name { font-weight: 600; font-size: 0.9rem; }
        
        .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
        
        .scroll-top-btn { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: var(--btn-gradient); color: white; border: none; cursor: pointer; box-shadow: var(--btn-shadow); font-size: 1.5rem; transition: all 0.3s; z-index: 999; display: none; align-items: center; justify-content: center; }
        .scroll-top-btn:hover { transform: translateY(-5px) scale(1.1); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); border-radius: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 2rem; position: relative; }
        .modal-close { position: absolute; top: 1rem; right: 1rem; padding: 0.5rem 1rem; }
        
        .author-header { text-align: center; background: var(--hero-bg); border-radius: 2rem; padding: 2rem; margin-bottom: 2rem; color: white; }
        .author-header img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 1rem; border: 4px solid white; }
        
        .search-tabs { display: flex; gap: 1rem; justify-content: center; margin: 2rem 0 1rem; }
        
        .sentinel { height: 20px; width: 100%; text-align: center; padding: 10px; color: var(--info-text); font-size: 0.8rem; }
        .loading-spinner { text-align: center; padding: 20px; }
        .loading-spinner i { font-size: 1.5rem; color: #ff5e7c; }
        
        @media (max-width: 768px) { .anime-grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } .nav-search-input { width: 120px; } }
        
        .error-page { text-align: center; padding: 4rem 2rem; background: linear-gradient(135deg, #ff6b6b, #c92a2a); border-radius: 2rem; color: white; }
    </style>
</head>
<body>
<header>
    <nav><ul>
        <li><a href="/" data-route="/"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="/anime" data-route="/anime"><i class="fas fa-tv"></i> Anime</a></li>
        <li><a href="/manga" data-route="/manga"><i class="fas fa-book"></i> Manga</a></li>
        <li><a href="/authors" data-route="/authors"><i class="fas fa-users"></i> Authors</a></li>
        <li><a href="/favorites" data-route="/favorites"><i class="fas fa-heart"></i> Favorites</a></li>
        <li class="nav-search">
            <input type="text" id="navSearchInput" class="nav-search-input" placeholder="Search...">
            <button id="navSearchBtn" class="nav-search-btn"><i class="fas fa-search"></i></button>
        </li>
        <li><button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i> Dark</button></li>
    </ul></nav>
</header>
<main id="app"></main>
<footer><p>© 2026 Animeflow — All Rights Reserved | Avaya Shrestha </p></footer>
<button id="scrollTopBtn" class="scroll-top-btn"><i class="fas fa-arrow-up"></i></button>
<div id="characterModal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
    // ========== FAVORITES SYSTEM ==========
    let favorites = new Set();
    function loadFavorites() { const stored = localStorage.getItem('animeflow_favorites_v6'); if (stored) favorites = new Set(JSON.parse(stored)); }
    function saveFavorites() { localStorage.setItem('animeflow_favorites_v6', JSON.stringify([...favorites])); }
    function toggleFavorite(id, type) { const key = `${type}_${id}`; if (favorites.has(key)) favorites.delete(key); else favorites.add(key); saveFavorites(); renderCurrentView(); }
    function isFavorite(id, type) { return favorites.has(`${type}_${id}`); }
    loadFavorites();
    
    // ========== MARKDOWN PARSER ==========
    function parseMarkdownLinks(text) {
        if (!text) return '';
        let parsed = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, linkText, url) => {
            const staffMatch = url.match(/anilist\.co\/staff\/(\d+)/);
            const characterMatch = url.match(/anilist\.co\/character\/(\d+)/);
            if (staffMatch) return `<a href="#" onclick="event.preventDefault(); window.navigateTo('/author/${staffMatch[1]}')" style="color:#ff5e7c;">${escapeHtml(linkText)}</a>`;
            if (characterMatch) return `<a href="#" onclick="event.preventDefault(); fetchCharacterModal(${characterMatch[1]})" style="color:#ff5e7c;">${escapeHtml(linkText)}</a>`;
            return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:#ff5e7c;">${escapeHtml(linkText)}</a>`;
        });
        parsed = parsed.replace(/~!([^!]+)!~/g, (match, content) => `<span class="spoiler" onclick="this.classList.toggle('revealed')">${escapeHtml(content)}</span>`);
        return parsed;
    }
    
    async function fetchCharacterModal(id) {
        const query = `query($id: Int) { Character(id: $id) { id name { full } image { large } description } }`;
        const data = await queryGQL(query, { id });
        if (data.Character) {
            const c = data.Character;
            const desc = parseMarkdownLinks(c.description || 'No description available.');
            showModal(`<span class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i> Close</span><img src="${c.image?.large || ''}" style="width:120px;border-radius:50%;margin:0 auto 1rem;display:block"><h2><i>${escapeHtml(c.name?.full)}</i></h2><div style="margin-top:1rem;line-height:1.6;">${desc}</div>`);
        }
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
    function renderHtml(html) { if(!html) return 'No description available.'; return parseMarkdownLinks(html); }
    
    // ========== API ==========
    const API = "https://graphql.anilist.co";
    async function queryGQL(query, vars) {
        const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query, variables: vars }) });
        const json = await res.json();
        if (json.errors) throw new Error(json.errors[0].message);
        return json.data;
    }
    
    async function fetchMedia(type, sort, page = 1, perPage = 20) {
        const query = `query($page: Int, $perPage: Int) { Page(page: $page, perPage: $perPage) { media(type: ${type}, sort: ${sort}, isAdult: false) { id title { romaji english } coverImage { large } averageScore format episodes chapters } } }`;
        const data = await queryGQL(query, { page, perPage });
        return data.Page.media;
    }
    
    async function fetchMediaByGenre(genre, type = "ANIME", page = 1, perPage = 20) {
        const query = `query($page: Int, $perPage: Int, $genre: String) { Page(page: $page, perPage: $perPage) { media(genre: $genre, type: ${type}, sort: POPULARITY_DESC, isAdult: false) { id title { romaji english } coverImage { large } averageScore format } } }`;
        const data = await queryGQL(query, { page, perPage, genre });
        return data.Page.media;
    }
    
    async function fetchTrendingAnime(page=1) { return fetchMedia("ANIME", "TRENDING_DESC", page, 20); }
    async function fetchTopAiring(page=1) { return fetchMedia("ANIME", "SCORE_DESC", page, 20); }
    async function fetchActionAnime(page=1) { return fetchMediaByGenre("Action", "ANIME", page, 20); }
    async function fetchRomanceAnime(page=1) { return fetchMediaByGenre("Romance", "ANIME", page, 20); }
    async function fetchSliceOfLife(page=1) { return fetchMediaByGenre("Slice of Life", "ANIME", page, 20); }
    
    async function getAnimeById(id) {
        const query = `query($id: Int) { Media(id: $id, type: ANIME) { id title { romaji english native } coverImage { large } description averageScore popularity episodes duration status startDate { year } genres studios { edges { node { id name } isMain } } staff(perPage: 20) { edges { node { id name { full } image { large } primaryOccupations } role } } characters(perPage: 50) { edges { node { id name { full } image { large } description } } } recommendations(perPage: 12) { edges { node { mediaRecommendation { id title { romaji } coverImage { large } type averageScore } } } } } }`;
        const data = await queryGQL(query, { id });
        return data.Media;
    }
    
    async function getMangaById(id) {
        const query = `query($id: Int) { Media(id: $id, type: MANGA) { id title { romaji english native } coverImage { large } description averageScore popularity chapters volumes status startDate { year } genres staff(perPage: 20) { edges { node { id name { full } image { large } primaryOccupations } role } } characters(perPage: 50) { edges { node { id name { full } image { large } description } } } recommendations(perPage: 12) { edges { node { mediaRecommendation { id title { romaji } coverImage { large } type averageScore } } } } } }`;
        const data = await queryGQL(query, { id });
        return data.Media;
    }
    
    async function getAuthorById(id) {
        const query = `query($id: Int) { Staff(id: $id) { id name { full } image { large } description primaryOccupations staffMedia(page: 1, perPage: 30) { edges { node { id title { romaji } coverImage { large } type averageScore } } } } }`;
        const data = await queryGQL(query, { id });
        return data.Staff;
    }
    
    async function getPopularAuthors(page = 1, perPage = 24) {
        const query = `query($page: Int, $perPage: Int) { Page(page: $page, perPage: $perPage) { staff(sort: FAVOURITES_DESC) { id name { full } image { large } primaryOccupations } } }`;
        const data = await queryGQL(query, { page, perPage });
        return data.Page.staff;
    }
    
    async function searchMedia(queryStr, type, page=1) {
        const gql = `query($search: String, $page: Int, $type: MediaType) { Page(page: $page, perPage: 30) { media(search: $search, type: $type, sort: POPULARITY_DESC) { id title { romaji english } coverImage { large } averageScore format } } }`;
        const data = await queryGQL(gql, { search: queryStr, type, page });
        return data.Page.media;
    }
    
    // ========== INFINITE SCROLL MANAGER ==========
    class InfiniteScrollManager {
        constructor(fetchFunc, containerId, type, extraParams = []) {
            this.fetchFunc = fetchFunc;
            this.containerId = containerId;
            this.type = type;
            this.extraParams = extraParams;
            this.page = 1;
            this.loading = false;
            this.hasMore = true;
            this.sentinel = null;
            this.observer = null;
        }
        
        async loadMore() {
            if (this.loading || !this.hasMore) return;
            this.loading = true;
            this.showSentinelLoading();
            try {
                const newItems = await this.fetchFunc(this.page + 1, ...this.extraParams);
                if (!newItems || newItems.length === 0) { this.hasMore = false; this.hideSentinel(); return; }
                this.page++;
                this.appendItems(newItems);
            } catch(e) { this.hasMore = false; } finally { this.loading = false; this.resetSentinel(); }
        }
        
        appendItems(items) {
            const container = document.getElementById(this.containerId);
            if (!container) return;
            let grid = container.querySelector('.anime-grid');
            if (!grid) { grid = document.createElement('div'); grid.className = 'anime-grid'; container.appendChild(grid); }
            items.forEach(item => {
                const isFav = isFavorite(item.id, this.type);
                const card = document.createElement('div'); card.className = 'anime-card';
                card.onclick = (e) => { if(e.target.closest('.fav-btn-card')) return; navigateTo(`/${this.type}/${item.id}`); };
                const score = item.averageScore ? (item.averageScore/10).toFixed(1) : 'N/A';
                card.innerHTML = `<div class="card-img"><img src="${item.coverImage?.large || ''}" loading="lazy"><div class="card-badge">⭐ ${score}</div><div class="fav-btn-card ${isFav ? 'fav-active' : ''}" data-id="${item.id}" data-type="${this.type}"><i class="fas fa-heart"></i></div></div><div class="card-content"><div class="card-title"><i>${escapeHtml(item.title?.english || item.title?.romaji || 'Untitled')}</i></div><div class="card-info"><span>${item.format || (this.type === 'anime' ? 'TV' : 'Manga')}</span><span>⭐ ${score}</span></div></div>`;
                grid.appendChild(card);
            });
            grid.querySelectorAll('.fav-btn-card').forEach(btn => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); const t = btn.dataset.type; toggleFavorite(id, t); });
            });
        }
        
        showSentinelLoading() { if (this.sentinel) this.sentinel.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Loading more...</div>'; }
        resetSentinel() { if (this.sentinel && this.hasMore) this.sentinel.innerHTML = '<div class="sentinel">Scroll for more ▼</div>'; else if (this.sentinel && !this.hasMore) this.sentinel.innerHTML = '<div class="sentinel">✨ You\'ve reached the end ✨</div>'; }
        hideSentinel() { if (this.sentinel) this.sentinel.style.display = 'none'; }
        
        attach(containerElement) {
            if (!containerElement) return;
            this.sentinel = document.createElement('div'); this.sentinel.className = 'sentinel'; this.sentinel.innerHTML = '<div class="sentinel">Scroll for more ▼</div>';
            containerElement.appendChild(this.sentinel);
            this.observer = new IntersectionObserver((entries) => { if (entries[0].isIntersecting && !this.loading && this.hasMore) this.loadMore(); }, { threshold: 0.1, rootMargin: '100px' });
            this.observer.observe(this.sentinel);
        }
        detach() { if (this.observer) this.observer.disconnect(); if (this.sentinel) this.sentinel.remove(); }
    }
    
    function renderSkeleton(containerId, count = 12) {
        const container = document.getElementById(containerId);
        if (container) container.innerHTML = `<div class="skeleton-grid">${Array(count).fill().map(() => `<div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-title"></div><div class="skeleton-text"></div></div>`).join('')}</div>`;
    }
    
    function renderCardGrid(items, containerId, type, attachInfiniteScroll = false, fetchFunc = null, extraParams = []) {
        const container = document.getElementById(containerId);
        if (!items || items.length === 0) { container.innerHTML = '<div class="empty-state">No results found.</div>'; return null; }
        const grid = document.createElement('div'); grid.className = 'anime-grid';
        items.forEach(item => {
            const isFav = isFavorite(item.id, type);
            const card = document.createElement('div'); card.className = 'anime-card';
            card.onclick = (e) => { if(e.target.closest('.fav-btn-card')) return; navigateTo(`/${type}/${item.id}`); };
            const score = item.averageScore ? (item.averageScore/10).toFixed(1) : 'N/A';
            card.innerHTML = `<div class="card-img"><img src="${item.coverImage?.large || ''}" loading="lazy"><div class="card-badge">⭐ ${score}</div><div class="fav-btn-card ${isFav ? 'fav-active' : ''}" data-id="${item.id}" data-type="${type}"><i class="fas fa-heart"></i></div></div><div class="card-content"><div class="card-title"><i>${escapeHtml(item.title?.english || item.title?.romaji || 'Untitled')}</i></div><div class="card-info"><span>${item.format || (type === 'anime' ? 'TV' : 'Manga')}</span><span>⭐ ${score}</span></div></div>`;
            grid.appendChild(card);
        });
        container.innerHTML = ''; container.appendChild(grid);
        grid.querySelectorAll('.fav-btn-card').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); const t = btn.dataset.type; toggleFavorite(id, t); }); });
        if (attachInfiniteScroll && fetchFunc) { const manager = new InfiniteScrollManager(fetchFunc, containerId, type, extraParams); manager.attach(container); return manager; }
        return null;
    }
    
    function showModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('characterModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('characterModal').style.display = 'none'; }
    window.onclick = (e) => { if (e.target === document.getElementById('characterModal')) closeModal(); };
    window.closeModal = closeModal;
    window.fetchCharacterModal = fetchCharacterModal;
    
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function setPageTitle(title) { document.title = title ? `${title} | Animeflow` : 'Animeflow'; }
    
    // ========== PAGES ==========
    async function homePage() {
    setPageTitle("Home");
    document.getElementById('app').innerHTML = `<div class="hero"><h1><i class="fas fa-dragon"></i> Animeflow</h1><p>Discover, Track, and Explore Anime & Manga</p></div>
        <div class="section-title"><i class="fas fa-chart-line"></i> Trending Anime</div><div id="trendingHome"></div>
        <div class="section-title"><i class="fas fa-fire"></i> Top Airing</div><div id="topAiringHome"></div>
        <div class="section-title"><i class="fas fa-fist-raised"></i> Action</div><div id="actionHome"></div>

        renderCardGrid(await fetchActionAnime(1), 'actionHome', 'anime', false);
        renderCardGrid(await fetchRomanceAnime(1), 'romanceHome', 'anime', false);

    async function animeContainerPage() {
        setPageTitle("Anime Collection");
        document.getElementById('app').innerHTML = `<div class="section-title"><i class="fas fa-tv"></i> Anime Universe</div>
            <div class="categories-scroll" id="animeCategories"></div>
            <div id="animeContent"></div>`;
        const categories = ['Top Airing', 'Trending', 'Action', 'Romance', 'Slice of Life', 'Drama', 'Comedy', 'Fantasy', 'Sci-Fi'];
        const categoryMap = { 'Top Airing': fetchTopAiring, 'Trending': fetchTrendingAnime, 'Action': fetchActionAnime, 'Romance': fetchRomanceAnime, 'Slice of Life': fetchSliceOfLife, 'Drama': (p) => fetchMediaByGenre("Drama", "ANIME", p, 20), 'Comedy': (p) => fetchMediaByGenre("Comedy", "ANIME", p, 20), 'Fantasy': (p) => fetchMediaByGenre("Fantasy", "ANIME", p, 20), 'Sci-Fi': (p) => fetchMediaByGenre("Sci-Fi", "ANIME", p, 20) };
        const container = document.getElementById('animeCategories');

        categories.forEach(cat => { const btn = document.createElement('button'); btn.className = 'category-btn'; btn.textContent = cat; btn.onclick = () => { document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); switchCategory(cat); }; container.appendChild(btn); });

    async function mangaContainerPage() {
        setPageTitle("Manga Collection");
        document.getElementById('app').innerHTML = `<div class="section-title"><i class="fas fa-book"></i> Manga Universe</div><div id="mangaContent"></div>`;

    async function authorsPage() {
        setPageTitle("Popular Authors");
        document.getElementById('app').innerHTML = `<div class="hero"><h1><i class="fas fa-users"></i> Popular Authors & Artists</h1><p>Click on any author to see their works</p></div><div id="authorsGrid" class="characters-grid"></div>`;

    async function favoritesPage() {
        setPageTitle("My Favorites");
        const favArray = [...favorites];
        if (favArray.length === 0) { document.getElementById('app').innerHTML = '<div class="empty-state"><i class="far fa-heart"></i> No favorites yet. Click the heart icon on any anime/manga!</div>'; return; }
        const animeIds = favArray.filter(k => k.startsWith('anime_')).map(k => parseInt(k.split('_')[1]));
        const mangaIds = favArray.filter(k => k.startsWith('manga_')).map(k => parseInt(k.split('_')[1]));
        let allItems = [];
        if (animeIds.length) { const query = `query($ids: [Int]) { Page(perPage: 50) { media(id_in: $ids, type: ANIME) { id title { romaji english } coverImage { large } averageScore format } } }`; const data = await queryGQL(query, { ids: animeIds }); allItems.push(...data.Page.media); }
        if (mangaIds.length) { const query = `query($ids: [Int]) { Page(perPage: 50) { media(id_in: $ids, type: MANGA) { id title { romaji english } coverImage { large } averageScore format } } }`; const data = await queryGQL(query, { ids: mangaIds }); allItems.push(...data.Page.media); }
        document.getElementById('app').innerHTML = `<div class="section-title"><i class="fas fa-heart"></i> Your Favorites (${allItems.length})</div><div id="favGrid"></div>`;

    async function searchPage(query) {
        setPageTitle(`Search: ${query}`);
        document.getElementById('app').innerHTML = `<div class="search-tabs"><button id="searchAnimeTab" class="search-type-btn active"><i class="fas fa-tv"></i> Search Anime</button><button id="searchMangaTab" class="search-type-btn"><i class="fas fa-book"></i> Search Manga</button></div>
            <div class="section-title"><i class="fas fa-search"></i> Results for "<i>${escapeHtml(query)}</i>"</div><div id="searchResults"></div>`;
        let currentManager = null;
        async function performSearch(type) { if (currentManager) currentManager.detach(); renderSkeleton('searchResults', 12); const results = await searchMedia(query, type, 1); currentManager = renderCardGrid(results, 'searchResults', type === 'ANIME' ? 'anime' : 'manga', true, (page) => searchMedia(query, type, page)); }
        await performSearch('ANIME');
        document.getElementById('searchAnimeTab').onclick = async () => { document.getElementById('searchAnimeTab').classList.add('active'); document.getElementById('searchMangaTab').classList.remove('active'); await performSearch('ANIME'); };
        document.getElementById('searchMangaTab').onclick = async () => { document.getElementById('searchMangaTab').classList.add('active'); document.getElementById('searchAnimeTab').classList.remove('active'); await performSearch('MANGA'); };

        setPageTitle(`${genre} Anime`);
        document.getElementById('app').innerHTML = `<div class="hero"><h1><i class="fas fa-tag"></i> <i>${escapeHtml(genre)}</i> Anime</h1></div><div id="genreContent"></div>`;
        renderSkeleton('genreContent', 20);
        const items = await fetchMediaByGenre(genre, "ANIME", 1, 30);
        renderCardGrid(items, 'genreContent', 'anime', true, (page) => fetchMediaByGenre(genre, "ANIME", page, 20), [genre]);

    async function authorPage(id) {
        try {
            const author = await getAuthorById(id, 1, 20);
            if (!author) throw new Error();
            setPageTitle(author.name?.full);
            
            let currentPage = 1;
            let isLoading = false;
            let hasMore = true;
            
            document.getElementById('app').innerHTML = `
                <div class="author-header">
                    <img src="${author.image?.large || ''}">
                    <h1><i>${escapeHtml(author.name?.full)}</i></h1>
                    <div class="detail-meta" style="justify-content:center">
                        ${author.primaryOccupations?.map(o => `<span>${o}</span>`).join('') || '<span>Creator</span>'}
                    </div>
                    <div class="author-description-box">
                        ${renderHtml(author.description || 'No description available.')}
                    </div>
                </div>
                <div class="section-title"><i class="fas fa-book"></i> Works by ${escapeHtml(author.name?.full)}</div>
                <div id="authorWorks"></div>
                <div id="authorSentinel" class="sentinel"></div>
            `;
            
            const container = document.getElementById('authorWorks');
            const sentinel = document.getElementById('authorSentinel');
            
            // Load initial works
            const initialWorks = author.staffMedia?.edges?.map(e => e.node) || [];
            renderCardGrid(initialWorks, 'authorWorks', 'anime');
            
            // Setup intersection observer
            const observer = new IntersectionObserver(async (entries) => {
                if (entries[0].isIntersecting && !isLoading && hasMore) {
                    isLoading = true;
                    sentinel.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Loading more...</div>';
                    
                    try {
                        currentPage++;
                        const newWorks = await fetchAuthorWorks(parseInt(id), currentPage, 20);
                        
                        if (!newWorks || newWorks.length === 0) {
                            hasMore = false;
                            sentinel.innerHTML = '<div class="sentinel">✨ No more works ✨</div>';
                            observer.disconnect();
                        } else {
                            // Append new works
                            const grid = container.querySelector('.anime-grid');
                            newWorks.forEach(item => {
                                const isFav = isFavorite(item.id, 'anime');
                                const card = document.createElement('div');
                                card.className = 'anime-card';
                                card.onclick = () => navigateTo(`/anime/${item.id}`);
                                const score = item.averageScore ? (item.averageScore/10).toFixed(1) : 'N/A';
                                card.innerHTML = `<div class="card-img"><img src="${item.coverImage?.large || ''}"><div class="card-badge">⭐ ${score}</div><div class="fav-btn-card ${isFav ? 'fav-active' : ''}" data-id="${item.id}" data-type="anime"><i class="fas fa-heart"></i></div></div><div class="card-content"><div class="card-title"><i>${escapeHtml(item.title?.romaji || 'Untitled')}</i></div><div class="card-info"><span>${item.type === 'ANIME' ? 'TV' : 'Manga'}</span><span>⭐ ${score}</span></div></div>`;
                                grid.appendChild(card);
                            });
                            
                            // Re-attach event listeners for new favorite buttons
                            grid.querySelectorAll('.fav-btn-card').forEach(btn => {
                                btn.addEventListener('click', (e) => {
                                    e.stopPropagation();
                                    const id = parseInt(btn.dataset.id);
                                    toggleFavorite(id, 'anime');
                                });
                            });
                            
                            sentinel.innerHTML = '<div class="sentinel">Scroll for more ▼</div>';
                        }
                    } catch(e) {
                        console.warn(e);
                        hasMore = false;
                    } finally {
                        isLoading = false;
                    }
                }
            }, { threshold: 0.1, rootMargin: '100px' });
            
            observer.observe(sentinel);
            
        } catch(e) {
            document.getElementById('app').innerHTML = '<div class="empty-state">Author not found</div>';
        }
    }
    
    async function renderAnimeDetail(id) { const anime = await getAnimeById(id); setPageTitle(anime.title?.english || anime.title?.romaji); renderDetailPage(anime, 'anime'); }
    async function renderMangaDetail(id) { const manga = await getMangaById(id); setPageTitle(manga.title?.english || manga.title?.romaji); renderDetailPage(manga, 'manga'); }
    
    function renderDetailPage(media, type) {
        const genres = media.genres || [];
        const studios = media.studios?.edges?.filter(s => s.isMain).map(s => s.node) || [];
        const authors = media.staff?.edges?.filter(s => s.role === 'Story' || s.role === 'Author' || s.role === 'Writer' || s.node.primaryOccupations?.includes('Manga Artist')).slice(0, 10) || [];
        
        document.getElementById('app').innerHTML = `<div class="detail-page"><div class="detail-header"><div class="detail-cover"><img src="${media.coverImage?.large || ''}"></div><div class="detail-info"><h1 class="detail-title"><i>${escapeHtml(media.title?.english || media.title?.romaji)}</i></h1><div class="detail-meta"><span>⭐ ${(media.averageScore/10).toFixed(1)}</span><span>❤️ ${media.popularity}</span>${media.episodes ? `<span>📺 ${media.episodes} eps</span>` : ''}${media.chapters ? `<span>📖 ${media.chapters} ch</span>` : ''}<span>${media.status || 'Unknown'}</span></div>
            ${genres.length ? `<div><strong>Genres:</strong> ${genres.map(g => `<span class="clickable-chip" data-genre="${escapeHtml(g)}">${escapeHtml(g)}</span>`).join(' ')}</div>` : ''}
            ${studios.length ? `<div><strong>Studio:</strong> ${studios.map(s => `<span class="clickable-chip" data-studio="${escapeHtml(s.name)}">${escapeHtml(s.name)}</span>`).join(' ')}</div>` : ''}
            ${authors.length ? `<div><strong>Authors/Artists:</strong> ${authors.map(a => `<span class="clickable-chip" data-author="${a.node.id}">${escapeHtml(a.node.name?.full)}</span>`).join(' ')}</div>` : ''}
            <div class="about-section"><div class="section-title" style="margin:0 0 1rem 0;">What's this ${type} about?</div><div id="aboutContent" class="about-content">${renderHtml(media.description?.substring(0, 400) || 'No description.')}${media.description?.length > 400 ? '...' : ''}</div><button id="readMoreBtn" class="btn-3d" style="margin-top:1rem;"><i class="fas fa-expand"></i> Read Full Description</button></div></div></div>
            <div class="section-title"><i class="fas fa-users"></i> Characters (${media.characters?.edges?.length || 0})</div><div id="charGrid" class="characters-grid"></div><button id="expandCharsBtn" class="btn-3d" style="margin-bottom:2rem;"><i class="fas fa-chevron-down"></i> Show More Characters</button>
            <div class="section-title"><i class="fas fa-thumbs-up"></i> Similar ${type === 'anime' ? 'Anime' : 'Manga'}</div><div id="similarGrid" class="similar-grid"></div></div>`;
        
        const aboutDiv = document.getElementById('aboutContent'); const readBtn = document.getElementById('readMoreBtn');
        let expanded = false;
        readBtn.onclick = () => {
            if (!expanded) { aboutDiv.innerHTML = renderHtml(media.description || 'No description.'); aboutDiv.classList.add('expanded'); readBtn.innerHTML = '<i class="fas fa-compress"></i> Show Less'; expanded = true; }
            else { aboutDiv.innerHTML = renderHtml((media.description || '').substring(0, 400)) + ((media.description?.length || 0) > 400 ? '...' : ''); aboutDiv.classList.remove('expanded'); readBtn.innerHTML = '<i class="fas fa-expand"></i> Read Full Description'; expanded = false; }
        };
        
        const charsGrid = document.getElementById('charGrid'); const expandCharsBtn = document.getElementById('expandCharsBtn');
        if (media.characters?.edges?.length) {
            const allChars = media.characters.edges; let charsExpanded = false;
            const renderChars = (showAll) => {
                const charsToShow = showAll ? allChars : allChars.slice(0, 15);
                charsGrid.innerHTML = '';
                charsToShow.forEach(edge => { const c = edge.node; const card = document.createElement('div'); card.className = 'character-card'; card.innerHTML = `<img src="${c.image?.large || ''}"><div class="character-name"><i>${escapeHtml(c.name?.full)}</i></div>`; card.onclick = () => { const desc = parseMarkdownLinks(c.description || 'No description available.'); showModal(`<span class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i> Close</span><img src="${c.image?.large || ''}" style="width:120px;border-radius:50%;margin:0 auto 1rem;display:block"><h2><i>${escapeHtml(c.name?.full)}</i></h2><div style="margin-top:1rem;line-height:1.6;">${desc}</div>`); }; charsGrid.appendChild(card); });
                charsGrid.style.maxHeight = showAll ? 'none' : '600px';
                expandCharsBtn.innerHTML = showAll ? '<i class="fas fa-chevron-up"></i> Show Less Characters' : `<i class="fas fa-chevron-down"></i> Show More Characters (${allChars.length - 15} more)`;
            };
            renderChars(false);
            expandCharsBtn.onclick = () => { charsExpanded = !charsExpanded; renderChars(charsExpanded); };
        } else { charsGrid.innerHTML = '<div class="empty-state">No characters available</div>'; expandCharsBtn.style.display = 'none'; }
        
        if (media.recommendations?.edges?.length) {
            const simGrid = document.getElementById('similarGrid');
            media.recommendations.edges.slice(0, 12).forEach(edge => { const rec = edge.node.mediaRecommendation; const recType = rec.type === 'ANIME' ? 'anime' : 'manga'; const card = document.createElement('div'); card.className = 'anime-card'; card.onclick = () => navigateTo(`/${recType}/${rec.id}`); const score = rec.averageScore ? (rec.averageScore/10).toFixed(1) : 'N/A'; card.innerHTML = `<div class="card-img"><img src="${rec.coverImage?.large || ''}"><div class="card-badge">⭐ ${score}</div></div><div class="card-content"><div class="card-title"><i>${escapeHtml(rec.title?.romaji || 'Untitled')}</i></div></div>`; simGrid.appendChild(card); });
        } else { document.getElementById('similarGrid').innerHTML = '<div class="empty-state">No recommendations found</div>'; }
        
        document.querySelectorAll('[data-genre]').forEach(el => { el.onclick = () => navigateTo(`/genre/${encodeURIComponent(el.dataset.genre)}`); });
        document.querySelectorAll('[data-author]').forEach(el => { el.onclick = () => navigateTo(`/author/${el.dataset.author}`); });
    }
    
    function render404Page() { document.getElementById('app').innerHTML = '<div class="error-page"><h1>404</h1><h2>Page Not Found</h2><button onclick="window.navigateTo(\'/\')" class="btn-3d">Back to Home</button></div>'; }
    
    function navigateTo(url) { window.history.pushState({}, '', url); renderCurrentView(); scrollToTop(); }
    
    async function renderCurrentView() {
        const path = window.location.pathname;
        const search = window.location.search;
        const params = new URLSearchParams(search);
        const query = params.get('q');
        
        if (path.match(/^\/anime\/\d+$/)) { await renderAnimeDetail(parseInt(path.split('/')[2])); }
        else if (path.match(/^\/manga\/\d+$/)) { await renderMangaDetail(parseInt(path.split('/')[2])); }
        else if (path.match(/^\/author\/(\d+)$/)) { await authorPage(path.match(/^\/author\/(\d+)$/)[1]); }
        else if (path.match(/^\/genre\/(.+)$/)) { await genrePage(decodeURIComponent(path.match(/^\/genre\/(.+)$/)[1])); }
        else if (path === '/anime') await animeContainerPage();
        else if (path === '/manga') await mangaContainerPage();
        else if (path === '/authors') await authorsPage();
        else if (path === '/favorites') await favoritesPage();
        else if (path === '/search' && query) await searchPage(query);
        else if (path === '/' || path === '') await homePage();
        else render404Page();
        
        document.querySelectorAll('nav a[data-route]').forEach(link => { const href = link.getAttribute('href'); if (href === path || (path === '/' && href === '/')) link.classList.add('active'); else link.classList.remove('active'); });
    }
    
    window.navigateTo = navigateTo;
    
    // ========== INIT ==========
    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => { scrollBtn.style.display = window.scrollY > 300 ? 'flex' : 'none'; });
    scrollBtn.onclick = scrollToTop;
    
    document.getElementById('navSearchBtn').onclick = () => { const q = document.getElementById('navSearchInput').value.trim(); if (q) navigateTo(`/search?q=${encodeURIComponent(q)}`); };
    document.getElementById('navSearchInput').onkeypress = (e) => { if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) navigateTo(`/search?q=${encodeURIComponent(q)}`); } };
    
    document.getElementById('themeToggle').addEventListener('click', () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); });
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    
    window.addEventListener('popstate', () => renderCurrentView());
    document.querySelectorAll('nav a[data-route]').forEach(link => { link.addEventListener('click', (e) => { e.preventDefault(); navigateTo(link.getAttribute('href')); }); });
    
    renderCurrentView();
</script>
